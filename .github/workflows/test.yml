name: tests

# Runs the pytest suite on every push and PR to main.
# This is the first CI for civil-toolbox: it turns the auditability
# conventions in ENGINEERING_STANDARDS.md into an enforced gate, starting
# with the CalculationResult audit-trail completeness contract.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Real supported floor is 3.10: the package uses PEP 604 unions
      # (X | None) in runtime-evaluated signatures without
      # `from __future__ import annotations`, which raise TypeError on 3.8/3.9
      # (e.g. civil_toolbox/rainfall/validation.py). requires-python is >=3.10
      # to match. Bump the ceiling here as newer interpreters are verified.
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        # No runtime deps (dependencies = []); dev extra brings pytest + pytest-cov.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest
